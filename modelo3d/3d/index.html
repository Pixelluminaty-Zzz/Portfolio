<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fondo</title>

    <link rel="stylesheet" href="3d.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
    
    <model-viewer 
        id="modelo-fondo" 
        src="tesla/source/tesla.glb"
        autoplay
        disable-zoom 
        interaction-prompt="none"
        camera-controls
        class="contenedor">
    </model-viewer>

    <div class="contenido">
        <h1>Desliza para rotar el modelo</h1>
    </div>

    <script src="3d.js"></script>
</body>
</html>
